<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
    <title>BH Sport - Baza sportaša</title>
</head>
<body> 
    <header></header>
    <main> 
      <section id="pocetna" class="hero">
        <div class="hero-image-container">
          <img class="hero-slika" src="./images/sport.png" alt="Sport Bosne i Hercegovine">
        </div>

        <div class="hero-content">
          <h1 class="hero-title">Sportisti BiH</h1>
          <p class="hero-subtitle">Dobrodošli u digitalnu bazu podataka najboljih sportista i sportskih kolektiva Bosne i Hercegovine. Upoznajte ambasadore koji našu domovinu predstavljaju u najboljem svjetlu širom svijeta.</p>
        </div>
      </section>
      
      <section id="sportisti" class="ponuda-sekcija">
        <div class="sekcija-zaglavlje">
            <h2>Sportovi</h2>
            <input 
                type="text" 
                id="search-input" 
                class="pretraga-input"
                placeholder="Pretraži sportove..." 
            >
        </div>

        <div class="ponuda-grid" id="ponuda-grid"></div>
      </section>
    </main>

    <footer id="kontakt"> </footer>
    <script src="./js/script.js"></script>
    <script src="./js/zajednicko.js"></script>
  </body>
</html>
